<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — PetSocial 🐾</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
    * { font-family: 'Inter', sans-serif; }

    /* Animated gradient background */
    body {
      background: linear-gradient(135deg, #1a0533 0%, #3b0764 40%, #831843 100%);
      min-height: 100vh;
    }

    /* Floating paws */
    .paw {
      position: fixed;
      font-size: 1.5rem;
      opacity: 0.07;
      animation: floatPaw linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes floatPaw {
      0%   { transform: translateY(110vh) rotate(0deg);  opacity: 0; }
      10%  { opacity: 0.07; }
      90%  { opacity: 0.07; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* Card */
    .login-card {
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #f472b6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Input focus */
    .pet-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .pet-input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15);
      transform: scale(1.01);
    }

    /* Mode cards */
    .mode-card {
      cursor: pointer;
      border: 2px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      transition: all 0.2s;
      text-align: center;
    }
    .mode-card:hover { border-color: #ec4899; background: #fdf2f8; }
    .mode-card.selected {
      border-color: #ec4899;
      background: linear-gradient(135deg, #fdf2f8, #fce7f3);
      box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
    }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      color: white;
      font-weight: 800;
      font-size: 15px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(236, 72, 153, 0.5);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-primary:hover::after { opacity: 1; }

    /* Admin button */
    .btn-admin {
      width: 100%;
      padding: 12px;
      background: #111827;
      color: #9ca3af;
      font-weight: 700;
      font-size: 13px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-admin:hover { background: #1f2937; color: #f3f4f6; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #9ca3af;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4 relative">

  <!-- Floating paws -->
  <div id="paws"></div>

  <!-- Back link -->
  <a href="landing.html" class="fixed top-5 left-5 z-50 flex items-center gap-2 text-white/70 hover:text-white text-sm font-semibold transition">
    ← Voltar
  </a>

  <!-- Login Card -->
  <div class="login-card relative z-10 bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🐾</div>
      <h1 class="text-3xl font-black gradient-text">PetSocial</h1>
      <p class="text-gray-500 text-sm mt-1">Conectando pets e famílias</p>
    </div>

    <!-- Mode selector -->
    <p class="text-sm font-bold text-gray-700 mb-3">Como você quer entrar?</p>
    <div class="grid grid-cols-2 gap-3 mb-6" id="modeSelector">
      <div class="mode-card selected" onclick="selectMode('adotante', this)">
        <div class="text-2xl mb-1">🏠</div>
        <p class="font-bold text-sm text-gray-800">Adotante</p>
        <p class="text-xs text-gray-500 mt-0.5">Quero adotar</p>
      </div>
      <div class="mode-card" onclick="selectMode('tutor', this)">
        <div class="text-2xl mb-1">📢</div>
        <p class="font-bold text-sm text-gray-800">Tutor</p>
        <p class="text-xs text-gray-500 mt-0.5">Tenho pets</p>
      </div>
    </div>

    <!-- Name input -->
    <div class="mb-4">
      <label class="block text-sm font-bold text-gray-700 mb-1.5" for="nomeInput">Seu nome</label>
      <input
        id="nomeInput"
        type="text"
        placeholder="Ex: Maria Silva"
        class="pet-input"
        onkeydown="if(event.key==='Enter') entrar()"
        autofocus
      >
      <p id="erroNome" class="hidden text-xs text-red-500 mt-1.5">⚠️ Por favor, informe seu nome.</p>
    </div>

    <!-- Enter button -->
    <button class="btn-primary mb-4" onclick="entrar()">
      🐾 Entrar no PetSocial
    </button>

    <div class="divider mb-4">ou</div>

    <!-- Admin -->
    <button class="btn-admin" onclick="entrarAdmin()">
      🛡️ Modo Administrador
    </button>

    <!-- Footer info -->
    <p class="text-center text-xs text-gray-400 mt-6">
      Ao entrar, você aceita os termos de uso. <br>
      <a href="landing.html" class="text-pink-500 hover:underline">Ver a landing page →</a>
    </p>

  </div>

  <script>
    // --- Floating paws ---
    const container = document.getElementById('paws');
    ['🐾','🐶','🐱','❤️'].forEach(em => {
      for(let i = 0; i < 4; i++){
        const el = document.createElement('span');
        el.className = 'paw';
        el.textContent = em;
        el.style.left = (Math.random() * 100) + 'vw';
        el.style.bottom = '-10vh';
        el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
        el.style.animationDuration = (10 + Math.random() * 15) + 's';
        el.style.animationDelay = (Math.random() * 15) + 's';
        container.appendChild(el);
      }
    });

    // --- Mode selection ---
    let selectedMode = 'adotante';

    function selectMode(mode, el) {
      selectedMode = mode;
      document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }

    // --- Enter ---
    function entrar() {
      const nome = document.getElementById('nomeInput').value.trim();
      const erroEl = document.getElementById('erroNome');

      if (!nome) {
        erroEl.classList.remove('hidden');
        document.getElementById('nomeInput').focus();
        return;
      }
      erroEl.classList.add('hidden');

      // Save session
      sessionStorage.setItem('ps_user', nome);
      sessionStorage.setItem('ps_tipo', selectedMode);

      // Redirect to app
      window.location.href = `petsocial.html?user=${encodeURIComponent(nome)}&tipo=${selectedMode}`;
    }

    function entrarAdmin() {
      const nome = document.getElementById('nomeInput').value.trim() || 'Admin';
      sessionStorage.setItem('ps_user', nome);
      sessionStorage.setItem('ps_tipo', 'admin');
      window.location.href = `petsocial.html?user=${encodeURIComponent(nome)}&tipo=admin`;
    }
  </script>
</body>
</html>
